<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 60" width="270" height="60" fill="none" color="#0a0a0a">
  <!--
    YATA Horizontal Logo — Symbol + Wordmark
    Symbol (60×60) + YATA wordmark. Use CSS `color` to change color.
  -->

  <!-- Symbol scaled to 60×60 (scale 0.6 from 100×100 viewBox) -->
  <g transform="scale(0.6)">
    <!-- Head with eye cutout -->
    <path fill-rule="evenodd" fill="currentColor"
      d="M50,5
         a11,11 0 0,1 11,11
         a11,11 0 0,1 -11,11
         a11,11 0 0,1 -11,-11
         a11,11 0 0,1 11,-11 Z
         M50,12
         a2.5,2.5 0 0,1 2.5,2.5
         a2.5,2.5 0 0,1 -2.5,2.5
         a2.5,2.5 0 0,1 -2.5,-2.5
         a2.5,2.5 0 0,1 2.5,-2.5 Z"/>
    <!-- Body -->
    <ellipse cx="50" cy="50" rx="17" ry="21" fill="currentColor"/>
    <!-- Wings -->
    <path fill="currentColor" d="M33,46 C22,40 8,41 5,47 C3,53 16,58 33,52 Z"/>
    <path fill="currentColor" d="M67,46 C78,40 92,41 95,47 C97,53 84,58 67,52 Z"/>
    <!-- Legs + toes -->
    <line x1="43" y1="69" x2="36" y2="89" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
    <line x1="36" y1="89" x2="27" y2="95" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="36" y1="89" x2="44" y2="95" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="50" y1="71" x2="50" y2="91" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
    <line x1="50" y1="91" x2="43" y2="97" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="50" y1="91" x2="57" y2="97" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="57" y1="69" x2="64" y2="89" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
    <line x1="64" y1="89" x2="56" y2="95" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="64" y1="89" x2="73" y2="95" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Wordmark: translate(75, 7.6) scale(0.7) — letters centered vertically at y=30 -->
  <g transform="translate(75, 7.6) scale(0.7)"
     stroke="currentColor" stroke-width="5" stroke-linejoin="miter" stroke-linecap="butt">
    <!-- Y -->
    <polyline points="10,12 35,38 60,12"/>
    <line x1="35" y1="38" x2="35" y2="52"/>
    <!-- A -->
    <polyline points="80,52 105,12 130,52"/>
    <line x1="94" y1="34" x2="116" y2="34"/>
    <!-- T -->
    <line x1="150" y1="12" x2="200" y2="12"/>
    <line x1="175" y1="12" x2="175" y2="52"/>
    <!-- A -->
    <polyline points="220,52 245,12 270,52"/>
    <line x1="234" y1="34" x2="256" y2="34"/>
  </g>
</svg>
