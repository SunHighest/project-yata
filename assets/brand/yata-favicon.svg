<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none" color="#0a0a0a">
  <!--
    YATA Favicon — Three-legged crow, ultra minimal
    Recognizable at 16×16. Body + three legs = Yatagarasu essence.
    Use CSS `color` to change color.
  -->

  <!-- Body (head + torso as unified oval) -->
  <ellipse cx="16" cy="11" rx="7" ry="9" fill="currentColor"/>

  <!-- Three legs -->
  <line x1="12" y1="20" x2="9"  y2="30" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="16" y1="20" x2="16" y2="30" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20" y1="20" x2="23" y2="30" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
</svg>
