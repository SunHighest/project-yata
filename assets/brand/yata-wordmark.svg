<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" width="280" height="64" fill="none" color="#0a0a0a">
  <!--
    YATA Wordmark
    Geometric stroke-based letterforms. Use CSS `color` to change color.
    Letters span y=12 to y=52 (40 units tall) within this 280×64 canvas.
  -->
  <g stroke="currentColor" stroke-width="3.5" stroke-linejoin="miter" stroke-linecap="butt">

    <!-- Y -->
    <polyline points="10,12 35,38 60,12"/>
    <line x1="35" y1="38" x2="35" y2="52"/>

    <!-- A -->
    <polyline points="80,52 105,12 130,52"/>
    <line x1="94" y1="34" x2="116" y2="34"/>

    <!-- T -->
    <line x1="150" y1="12" x2="200" y2="12"/>
    <line x1="175" y1="12" x2="175" y2="52"/>

    <!-- A -->
    <polyline points="220,52 245,12 270,52"/>
    <line x1="234" y1="34" x2="256" y2="34"/>

  </g>
</svg>
