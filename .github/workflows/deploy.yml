name: Deploy to さくらインターネット

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (Static Export)
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

      - name: Deploy via SFTP
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass lftp
          lftp -e "
            set sftp:auto-confirm yes
            set sftp:connect-program 'sshpass -e ssh -o StrictHostKeyChecking=no'
            set net:max-retries 3
            set net:timeout 30
            open sftp://${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }}
            mirror --reverse --delete ./out/ ${{ secrets.FTP_SERVER_DIR }}
            bye
          "
